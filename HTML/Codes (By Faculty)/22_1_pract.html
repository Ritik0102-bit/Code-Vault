<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container
        {
            display:grid;
         grid-template-columns: 20% 40% 20% ;
         grid-template-rows: 70px 150px 70px;
         gap: 5px 5px;
        }
        .box{
            border:5px solid red;
            background-color: gray;

        }
        #box-1{
            grid-column: 1/4;
        }
        #box-5{
            grid-column: 1/4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box-1">Header</div>
        <div class="box" id="box-2">left content</div>
        <div class="box" id="box-3">middle content</div>
        <div class="box" id="box-4">right content</div>
        <div class="box" id="box-5">Footer</div>
    </div>
</body>
</html>
