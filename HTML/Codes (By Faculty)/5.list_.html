<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <!--An unordered list starts with the <ul> tag. 
        Each list item starts with the <li> tag-->
    <h2>An unordered HTML list</h2>
<ul style="list-style-type:disc;">
  <li>Apple</li>
  <li>Banana</li>
  <li>Orange</li>
</ul>  

<h2>An ordered HTML list</h2>
<ol type="1">
  <li>Coffee</li>
  <li>Tea</li>
  <li>Milk</li>
</ol>
  
<h2>A Description List</h2>

<dl> <!--<dl>	Defines a description list-->
  <dt>Coconut cookies</dt>         <!--<dt>	Defines a title in a description list-->
  <dd>- Crunchy cookies with goodness of Real Coconut</dd>
  <dt>Milk</dt>
  <dd>- white cold drink</dd>       <!--Describes the description in a  list-->
</dl>

</a>

</body>
</html>
