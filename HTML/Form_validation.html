<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-image: url(bg-image.png);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center; /* Horizontal view */
            align-items: center; /* vertical view */
            padding: 20%;
        }
        input {
            border-radius: 5px;
            border: 2px solid purple;
        }
        input:focus {
            background-color: burlywood;
        }
        input[type=submit]:hover {
            background-color: aquamarine;
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <script>
        function data()
        {
            var a=document.getElementById("i1").value;
            var b=document.getElementById("i2").value;
            var c=document.getElementById("i3").value;
            var d=document.getElementById("i4").value;
        // if field is empty so show the error
        if(a==""||b==""||c==""||d=="")
        {
            alert("All fields are mandatory");
            return false;
        }
        //contact length should be 10 digit 
        else if(b.length<10||b.length>10)
        {
            alert("Number should be of 10 digit! Please enter valid number");
            return false ;
        }
        //input is not a number NAN
        else if(isNAN(b))
        {
            alert("only numbers are allowed");
            return true;
        }
        else{
            true;
        }
        }
    </script>
    <form onsubmit="return data()" action="Form.html">
        UserID: <br>
        <input type="name" id="i1"><br>
        Mobile Number: <br>
        <input type="text" id="i2"><br>
        Password: <br>
        <input type="password" id="i3"><br>
        Confirm Password: <br>
        <input type="confirm password" id="i4"><br>
        <input type="submit" value="Submit Now" id="i5">
    </form>
</body>
</html>
