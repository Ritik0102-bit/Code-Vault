<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #form {
            border: 2px solid black;
            margin: 15px;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div id="form">
        <h1 id="h1">Keyboard Event</h1>
        <p>on keydown</p>
        <!--first script run then after printing of enter value-->
        <input type="text" onkeydown="document.getElementById('form').style.background=this.value" >
        <p>on keyup</p>
        <input type="text" onkeyup="document.getElementById('form').style.background=this.value">
        <p>on keypress</p>
        <input type="text" onkeypress="document.getElementById('form').style.background=this.value">
    </div>
</body>
</html>
