<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        .container{
             border:2px solid red;
             display: grid;
             /* height: 400px; */


             /* gap:20px 5px;  */
             row-gap: 20px;
             column-gap: 5px;

             /* create no. of columns & give width */
              /* grid-template-columns: 100px 200px 300px; */ 

                   /* Create only two columns */
                   /* grid-template-columns: 30% 70%; */

                /* Create four columns of same width (fr)fraction */
                /* grid-template-columns: 1fr 1fr 1fr 1fr; */

                /* make first cell of 2fr */
                /* grid-template-columns: 2fr 1fr 1fr 1fr; */

                /* create columns with same fraction value */
                /* grid-template-columns: repeat(4,1fr); */

                /* create columns th 100px value : left space is blank*/
                /* grid-template-columns: repeat(4,100px); */

                /* grid-template-columns: 200px auto; */

                grid-template-columns: 200px 200px 200px;
             
            grid-template-rows: 100px 80px;
            /* rest of the rows will get auto height */
            grid-auto-rows: 100px;

            /* justify-content: center; */
            /* justify-content: space-around; */

            /* justify-items: center; */

        }
        .box{
            border:2px solid green;
            padding:12px;
        }
        #box-1{
            background-color: aqua;
            /* justify-self: center; (works towards horizontally) */
            /* align-self: center; (works vertically) */
            
            /* grid-column-start: 1;
            grid-column-end: 3; */
            /* short Hand properties  */
            /* grid-column: 1/3; */
            /* grid-column:1/span 2; */
            /* grid-column: 1/-1; */
            
           
            /* grid-row: 1/3; */
             /* grid-column:1/4; */
            /* short  hand properties i.e.  grid-area: 1/1/3/4; */
            grid-area: 1/1/3/4 ;
            
        }
        #box-2{
            background-color: blueviolet;
            grid-area: 3/1/5/2;
        }

    </style>
</head>
<body>
    <!-- .container>.box#box-${box-$}*10 -->
    <div class="container">
        <div class="box" id="box-1">box-1</div>
        <div class="box" id="box-2">box-2</div>
        <div class="box" id="box-3">box-3</div>
        <div class="box" id="box-4">box-4</div>
        <div class="box" id="box-5">box-5</div>
        <div class="box" id="box-6">box-6</div>
        <div class="box" id="box-7">box-7</div>
        <div class="box" id="box-8">box-8</div>
        <div class="box" id="box-9">box-9</div>
        <div class="box" id="box-10">box-10</div>
    </div>

</body>
</html>
