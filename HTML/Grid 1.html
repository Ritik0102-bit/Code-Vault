<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 20px;
        }
        .container{
            display: grid;
            grid-template-rows: 100px 100px 100px 50px;
            grid-template-columns: 200px 300px 200px;
            /* grid-area: Rs Cs Re Ce; */
            grid-row-gap: 10px;
            grid-column-gap: 10px;
            justify-content: center;
        }

        .item {
            border: 2px solid red;
            background-color: gray;
            text-align: center;
            padding-top: 15px;
        }

        
        /* Grid Column */
        #item-1 {
            grid-area: 1/1/2/4;
        }

        #item-2 {
            grid-area: 2/1/4/2;
        }

        #item-3 {
            grid-area: 2/2/4/3;
        }

        #item-4 {
            grid-area: 2/3/4/4;
        }

        #item-5 {
            grid-area: 4/1/4/4;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="item-1">Header</div>
        <div class="item" id="item-2">Left Content</div>
        <div class="item" id="item-3">Middle Content</div>
        <div class="item" id="item-4">Right Content</div>
        <div class="item" id="item-5">Footer</div>
    </div>
</body>
</html>
